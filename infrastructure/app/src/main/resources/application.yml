management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"

spring:
  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${APP_KAFKA_CONSUMER_GROUP_ID:market-state-service}

app:
  kafka:
    schema-registry:
      url: ${APP_SCHEMA_REGISTRY_URL:http://localhost:8081}
      auto-register-schemas: ${APP_SCHEMA_REGISTRY_AUTO_REGISTER:true}
    topic:
      depth-diff: ${APP_KAFKA_TOPIC_DEPTH_DIFF:canonical.market.depthdiff.v1}
    topics:
      bbo-state: ${APP_KAFKA_TOPICS_BBO_STATE:state.bbo.v1}
      orderbook-topn-state: ${APP_KAFKA_TOPICS_ORDERBOOK_TOPN_STATE:state.orderbook.l2.topn.v1}
  binance:
    rest:
      base-url: ${APP_BINANCE_REST_BASE_URL:https://api.binance.com}
    snapshot:
      depth-limit: ${APP_BINANCE_SNAPSHOT_DEPTH_LIMIT:1000}
  state:
    max-buffered-events: ${APP_STATE_MAX_BUFFERED_EVENTS:10000}
  market-state:
    publish:
      topn-depth: ${APP_MARKET_STATE_PUBLISH_TOPN_DEPTH:10}
